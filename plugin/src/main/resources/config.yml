debug: false
chat:
  enabled: true
  proxy:
    enabled: true
    server-id: "server-1"
    forward-channels:
      - global
      - staff
  placeholders:
    "<displayname>": "%player_name%"
    "<rank>": "%luckperms_prefix%"
    "<suffix>": "%luckperms_suffix%"
    "<chatcolor>": "%bendinghub_chatcolor%"
  channels:
    global:
      prefix: '&7[&aGlobal&7]'
      permission: 'bendinghub.chat.channel.global'
      format: '<prefix> : <rank> <displayname> <suffix> Â» <chatcolor><message>'
      range: 0
    staff:
      prefix: '&7[&cStaff&7]'
      permission: 'bendinghub.chat.channel.staff'
      format: '<prefix> : <rank> <displayname> <suffix> Â» <chatcolor><message>'
      range: 0
    town:
      prefix: '&7[&bTown&7]'
      permission: 'bendinghub.chat.channel.town'
      format: '<prefix> : <rank> <displayname> <suffix> Â» <chatcolor><message>'
      range: 0
    nation:
      prefix: '&7[&6Nation&7]'
      permission: 'bendinghub.chat.channel.nation'
      format: '<prefix> : <rank> <displayname> <suffix> Â» <chatcolor><message>'
      range: 0
    local:
      prefix: '&7[&eLocal&7]'
      permission: 'bendinghub.chat.channel.local'
      format: '<prefix> : <rank> <displayname> <suffix> Â» <chatcolor><message>'
      range: 0
    nearby:
      prefix: '&7[&eNearby&7]'
      permission: 'bendinghub.chat.channel.nearby'
      format: '<prefix> : <rank> <displayname> <suffix> Â» <chatcolor><message>'
      range: 256 #16 chunks
    clearchat:
      linelength: 100
      # whether running /clearchat on one server clears chat on this server
      recieve: true
  chatcolor:
    blacklist:
      - ''&k'
      - '<obf>'
tab:
  placeholders:
    "<tabprefix>": "%luckperms_prefix%"
#    "<tagprefix>": "%luckperms_prefix%"
    "<customtabname>": "%player_displayname%"
#    "<customtagname>": "%player_displayname%"
    "<tabsuffix>": "%luckperms_suffix%"
#    "<tagsrefix>": "%luckperms_suffix%"
  header:
    - 'Welcome to the server %player_displayname%'
    - 'Online players: %server_online%'
  footer:
    - 'Visit our webpage %bendinghub_animation:web%'
  tabnameformat: "<tabprefix> <customtabname> <tabsuffix>"
#  tagnameformat: "<tagprefix> <customtagname> <tagsuffix>"
  updateIntervalTicks: 100
  weights:
    founder: 60
    co-owner: 55
    manager: 50
    admin: 45
    mod: 40
    helper: 35
    trainee: 30
    builder: 25
    creator: 20
    supporter: 15
    vip: 10
    default: 5



